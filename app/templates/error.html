<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error · Sugar Spike Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="text-center" style="color: var(--danger);">Error Occurred</h1>

        <div class="error-box">
            <h4>{{ error_title|default('An error occurred while processing your request') }}</h4>
            <p>{{ error_message }}</p>
        </div>

        {% if technical_details %}
        <div class="error-details">
            <h5>Technical details</h5>
            <code>{{ technical_details }}</code>
        </div>
        {% endif %}

        <div class="text-center">
            <a href="/" class="btn btn-primary">Return home</a>
        </div>
    </div>
</body>
</html>
